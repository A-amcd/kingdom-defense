name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up swap space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y openjdk-17-jdk unzip zip ant libncurses5-dev libncursesw5-dev libtool autoconf automake cmake build-essential zlib1g-dev pkg-config libssl-dev
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython>=3.0.0"
        pip install "buildozer==1.4.0" "python-for-android==2023.5.21"
    
    - name: Configure Android
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
    
    - name: Verify files
      run: |
        echo "=== Project files ==="
        ls -la
        echo "=== buildozer.spec content ==="
        cat buildozer.spec
        echo "=== main.py content ==="
        cat main.py
    
    - name: Clean previous builds
      run: |
        rm -rf .buildozer bin
    
    - name: Build APK with verbose output
      run: |
        echo "=== Starting APK build ==="
        buildozer android debug --verbose 2>&1 | tee build_output.txt
        echo "=== Build finished ==="
    
    - name: List output
      run: |
        echo "=== Listing output directories ==="
        ls -la bin/ 2>/dev/null || echo "bin/ not found"
        ls -la .buildozer/ 2>/dev/null || echo ".buildozer/ not found"
        if [ -f build_output.txt ]; then
          echo "=== Last 200 lines of build output ==="
          tail -200 build_output.txt
        fi
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kingdom-defense-apk
        path: |
          bin/*.apk
          build_output.txt