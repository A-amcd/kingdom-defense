name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up swap space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 8
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y openjdk-17-jdk unzip zip ant libncurses5-dev libncursesw5-dev libtool autoconf automake cmake build-essential zlib1g-dev pkg-config libssl-dev
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython>=3.0.0"
        pip install "buildozer==1.4.0" "python-for-android==2023.5.21"
    
    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses || true
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
    
    - name: Build APK
      run: |
        buildozer android debug -v 2>&1 | head -500
      env:
        P4A_RELEASE: 2023.5.21
        P4A_ANDROID_API: 33
        P4A_NDK_API: 21
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kingdom-defense-apk
        path: bin/*.apk