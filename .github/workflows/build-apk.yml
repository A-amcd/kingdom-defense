name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up swap space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 16
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y openjdk-17-jdk unzip zip ant libncurses5-dev libncursesw5-dev libtool autoconf automake cmake build-essential zlib1g-dev pkg-config libssl-dev libffi-dev
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython>=3.0.0"
        pip install "buildozer==1.4.0" "python-for-android==2023.5.21"
    
    - name: Configure Android
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
    
    - name: Clean previous builds
      run: |
        rm -rf .buildozer bin
    
    - name: Initialize Buildozer
      run: |
        echo "=== Initializing Buildozer environment ==="
        buildozer android update
    
    - name: Build APK
      run: |
        echo "=== Starting APK build ==="
        buildozer android debug 2>&1 | tee build_output.txt
        echo "=== Build finished ==="
    
    - name: Check build results
      run: |
        echo "=== Build directory listing ==="
        ls -la
        echo "=== bin directory ==="
        ls -la bin/ 2>/dev/null || echo "bin/ directory NOT found"
        echo "=== .buildozer directory ==="
        ls -la .buildozer/ 2>/dev/null || echo ".buildozer/ directory NOT found"
        echo "=== APK files ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK files found"
        echo "=== Last 300 lines of build output ==="
        tail -300 build_output.txt
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kingdom-defense-apk
        path: |
          bin/*.apk
          .buildozer/**/*.apk
          build_output.txt