name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk unzip zip ant libncurses5-dev libncursesw5-dev
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install "buildozer==1.4.0" "cython>=3.0.0" "python-for-android==2023.5.21"
    
    - name: Build APK
      run: |
        buildozer android debug
      env:
        P4A_RELEASE: 2023.5.21
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kingdom-defense-apk
        path: bin/*.apk