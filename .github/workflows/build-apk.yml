name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up swap space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y openjdk-17-jdk unzip zip ant libncurses5-dev libncursesw5-dev libtool autoconf automake cmake build-essential zlib1g-dev pkg-config libssl-dev
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython>=3.0.0"
        pip install "buildozer==1.4.0" "python-for-android==2023.5.21"
    
    - name: Verify Python environment
      run: |
        python --version
        pip list | grep -E "(buildozer|cython|pygame)"
    
    - name: Verify project files
      run: |
        echo "=== Project files ==="
        ls -la
        echo "=== buildozer.spec ==="
        cat buildozer.spec
        echo "=== main.py ==="
        cat main.py
    
    - name: Clean previous builds
      run: |
        rm -rf .buildozer bin
    
    - name: Build APK with verbose output
      run: |
        echo "=== Starting APK build at $(date) ==="
        buildozer android debug --verbose 2>&1 | tee build_output.txt
        echo "=== Build finished at $(date) ==="
    
    - name: Check build results
      run: |
        echo "=== Build directory listing ==="
        ls -la
        echo "=== bin directory contents ==="
        if [ -d "bin" ]; then
          ls -la bin/
        else
          echo "bin/ directory NOT found"
        fi
        echo "=== .buildozer directory ==="
        if [ -d ".buildozer" ]; then
          ls -la .buildozer/
          echo "=== APK files in .buildozer ==="
          find .buildozer -name "*.apk" 2>/dev/null || echo "No APK files found"
        else
          echo ".buildozer/ directory NOT found"
        fi
        echo "=== Last 500 lines of build output ==="
        tail -500 build_output.txt
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kingdom-defense-apk
        path: |
          bin/*.apk
          .buildozer/**/*.apk
          build_output.txt