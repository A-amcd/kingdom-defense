name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up swap space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y openjdk-17-jdk unzip zip ant libncurses5-dev libncursesw5-dev libtool autoconf automake cmake build-essential zlib1g-dev pkg-config libssl-dev
    
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip setuptools wheel
        pip install "cython>=3.0.0"
        pip install "buildozer==1.4.0" "python-for-android==2023.5.21"
    
    - name: Configure Android
      run: |
        mkdir -p ~/.android
        echo "count=0" > ~/.android/repositories.cfg
        mkdir -p /opt/android-sdk
        export ANDROID_SDK_ROOT=/opt/android-sdk
    
    - name: Build APK
      run: |
        echo "=== Starting Buildozer ==="
        buildozer android debug 2>&1 | tee buildozer_output.txt
        echo "=== Build completed ==="
    
    - name: Check build results
      run: |
        echo "=== Checking build results ==="
        if [ -d "bin" ]; then
          echo "bin/ directory exists"
          ls -la bin/
        else
          echo "bin/ directory NOT found"
        fi
        if [ -d ".buildozer" ]; then
          echo ".buildozer/ directory exists"
          ls -la .buildozer/android/platform/build-armeabi-v7a/dists/kingdomdefense/ 2>/dev/null || echo "dist directory not found"
        else
          echo ".buildozer/ directory NOT found"
        fi
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kingdom-defense-apk
        path: |
          bin/*.apk
          buildozer_output.txt